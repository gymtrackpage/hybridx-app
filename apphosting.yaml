# Settings to manage and configure a Firebase App Hosting backend.
# https://firebase.google.com/docs/app-hosting/configure

runConfig:
  # Increase this value if you'd like to automatically spin up
  # more instances in response to increased traffic.
  maxInstances: 1
env:
  # Public variables (not secret)
  - variable: NEXT_PUBLIC_APP_URL
    value: "https://app.hybridx.club"
  - variable: NEXT_PUBLIC_STRAVA_CLIENT_ID
    value: "12008"
  - variable: STRIPE_PRICE_ID
    value: "price_1S3Ki6GKLIEfAkDGEKkK9IIN"

  # Secrets (stored in Google Secret Manager)
  - variable: FIREBASE_SERVICE_ACCOUNT_KEY
    secret: FIREBASE_SERVICE_ACCOUNT_KEY
  - variable: STRIPE_SECRET_KEY
    secret: STRIPE_SECRET_KEY
  - variable: STRIPE_WEBHOOK_SECRET
    secret: STRIPE_WEBHOOK_SECRET
  - variable: STRAVA_CLIENT_SECRET
    secret: STRAVA_CLIENT_SECRET
  - variable: GEMINI_API_KEY
    secret: GEMINI_API_KEY
  - variable: CRON_SECRET
    secret: CRON_SECRET
  - variable: GMAIL_USER
    secret: GMAIL_USER
  - variable: GMAIL_APP_PASSWORD
    secret: GMAIL_APP_PASSWORD
  - variable: GARMIN_CLIENT_ID
    secret: GARMIN_CLIENT_ID
  - variable: GARMIN_CLIENT_SECRET
    secret: GARMIN_CLIENT_SECRET
